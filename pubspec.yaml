name: ecom_with_flutter
description: "A new Flutter project."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ^3.11.1

#---------------------------PACKAGES---------------------------#

dependencies:
  flutter:
    sdk: flutter
  flutter_native_splash: ^2.4.7
  get: ^4.7.3
  get_storage: ^2.1.1
  go_router: ^17.2.2
  http: ^1.6.0
  iconsax: ^0.0.8
  intl: ^0.20.2
  logger: ^2.7.0
  smooth_page_indicator: ^2.0.1
  url_launcher: ^6.3.2

#---------------------------PACKAGES ENDS---------------------------#

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  #---------------------------LOCAL ASSETS---------------------------#

  assets:
    - assets/logos/
    - assets/icons/
    - assets/images/

  #---------------------------LOCAL dFONTS---------------------------#

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Thin.ttf
          weight: 100
        - asset: assets/fonts/Poppins-Light.ttf
          weight: 300
        - asset: assets/fonts/Poppins-Regular.ttf
          weight: 400
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins-ExtraBold.ttf
          weight: 800
